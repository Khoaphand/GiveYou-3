<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tặng Bạn Nè !😗</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #1e293b, #020617); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 20px; transform: translateY(-30px); width: 100%; }
        .Text { font-size: 80px; color: aqua; text-shadow: 0 0 15px aqua; font-weight: bold; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(255, 140, 0, 0.2); text-align: center; width: 90%; max-width: 500px; animation: fadeIn 0.6s ease; }
        h1 { margin-bottom: 25px; font-size: 1.8rem; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 15px; background: linear-gradient(45deg, #ff7a00, #ffb347); color: black; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.03); box-shadow: 0 0 20px orange; }
        .input-text { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ffb347; background: rgba(255,255,255,0.1); color: white; font-size: 1rem; margin-bottom: 15px; outline: none; }
        .result { font-size: 22px; font-weight: 500; color: #ffb347; margin-top: 20px; white-space: pre-line; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
        .fade-out { animation: fadeOut 0.3s forwards; }
        .fade-in { animation: fadeIn 0.3s forwards; }
        @keyframes fadeOut { to {opacity: 0; transform: translateY(-20px);} }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="Text">Hello</div>
        <div class="card" id="app">
            <h1 id="question">Nhập tên hoặc lời nhắn của bạn:</h1>
            <div id="answers">
                <input type="text" id="userInput" class="input-text" placeholder="Viết gì đó vào đây...">
                <button class="btn" onclick="nextStep()">Tiếp tục ➔</button>
            </div>
        </div>
    </div>

    <script>
        let step = 1;
        let data = {};

        function changeContent(newQ, newAnsHTML) {
            const app = document.getElementById("app");
            app.classList.add("fade-out");
            setTimeout(() => {
                document.getElementById("question").innerText = newQ;
                document.getElementById("answers").innerHTML = newAnsHTML;
                app.classList.remove("fade-out");
                app.classList.add("fade-in");
            }, 300);
        }

        // Bước 1: Xử lý nhập Text
        function nextStep() {
            const val = document.getElementById("userInput").value;
            data.Loi_Nhan = val || "Trống";
            
            changeContent("Bạn thích chơi game gì nhất?", `
                <button class="btn" onclick="sendFinal('Roblox')">Roblox</button>
                <button class="btn" onclick="sendFinal('Minecraft')">Minecraft</button>
                <button class="btn" onclick="sendFinal('Valorant')">Valorant</button>
            `);
        }

        // Bước 2: Xử lý trắc nghiệm và Gửi mail
        function sendFinal(ans) {
            data.Game_Chon = ans;

            changeContent("🚀 Đang gửi...", `<p class="result">Đang gửi dữ liệu về mail... 📩</p>`);
            
            fetch("https://formspree.io", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(() => {
                setTimeout(() => {
                    changeContent("🎉 Xong rồi!", `<p class="result">Cảm ơn bạn đã tham gia! \nChúc một ngày tốt lành nhé! 😇</p>`);
                }, 1000);
            })
            .catch(() => {
                changeContent("Lỗi!", `<p class="result">Không gửi được, hãy thử lại nhé!</p>`);
            });
        }
    </script>
</body>
</html>
